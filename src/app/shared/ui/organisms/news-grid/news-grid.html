<div class="o-news-grid">
  <header class="o-news-grid__header">
    <div class="o-news-grid__header-content">
      <h2 id="section-news-title" class="o-news-grid__title">
        Lorem ipsum dolor sit
      </h2>
      <div class="o-news-grid__controls">
        <p class="o-news-grid__subtitle">Lorem ipsum dolor sit</p>

        <div class="o-news-grid__search">
          <label for="search" class="sr-only">Search articles</label>
          <app-icon
            src="assets/images/search.svg"
            class="o-news-grid__search-icon"
          />
          <input type="search" id="search" class="o-news-grid__search-input" />
        </div>
      </div>
    </div>
  </header>
  <ul class="o-news-grid__list" aria-labelledby="section-news-title">
    @for (article of articles; track $index) {
      <li class="o-news-grid__item">
        <app-news-card />
      </li>
    }
  </ul>
</div>
